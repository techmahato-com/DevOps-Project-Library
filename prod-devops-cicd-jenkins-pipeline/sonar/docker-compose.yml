# =============================================================================
# SonarQube Docker Compose
# Dev/Test: uses embedded H2 database (not for production)
#
# PRODUCTION: Uncomment SONAR_JDBC_* variables and point to RDS PostgreSQL.
# Recommended: Amazon RDS for PostgreSQL (db.t3.medium, Multi-AZ for prod)
# =============================================================================

services:
  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      # ── PRODUCTION: uncomment and set RDS values ──────────────────────────
      # SONAR_JDBC_URL: "jdbc:postgresql://<rds-endpoint>:5432/sonarqube"
      # SONAR_JDBC_USERNAME: "sonar"
      # SONAR_JDBC_PASSWORD: "<password-from-secrets-manager>"
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
